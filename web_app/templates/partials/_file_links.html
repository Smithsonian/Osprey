{% if file_links|length > 0 %}
  <div class="list-group">
    {% for link in file_links %}
      <a href="{{ link.link_url }}"
         title="{{ link.link_aria }}"
         class="list-group-item list-group-item-action"
         {% if link.link_url[0:4] == 'http' %}target="_blank" rel="noopener noreferrer"{% endif %}>
        {{ link.link_name | safe }}
        {% if link.link_url[0:4] == 'http' %}
          <i class="fa-solid fa-arrow-up-right-from-square fa-xs float-end text-muted" aria-hidden="true"></i>
        {% endif %}
      </a>
    {% endfor %}
  </div>
{% else %}
  <p class="text-muted mb-0">No links for this file.</p>
{% endif %}
